<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FAST Journey – ソノボくんと学ぶ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue-deep:#0a1628;--blue-mid:#1a3a6e;--blue-vivid:#1565d8;
  --blue-bright:#3d8ef0;--blue-light:#7bb8f8;
  --white:#fff;--gold:#f5c842;--green:#22c55e;
  --radius:20px;--radius-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;font-family:'Noto Sans JP',sans-serif;
  background:var(--blue-deep);color:var(--white);overflow-x:hidden;}

.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;
  background:linear-gradient(160deg,#040d1f 0%,#0a1e4a 40%,#091535 100%);}
.bg-canvas::before{content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(21,101,216,.25) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 90% 80%,rgba(61,142,240,.15) 0%,transparent 60%);}
.star{position:absolute;border-radius:50%;background:white;opacity:0;
  animation:twinkle var(--dur,3s) var(--delay,0s) infinite ease-in-out;}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--op,.7);transform:scale(1)}}
.wave-ring{position:absolute;border-radius:50%;border:1px solid rgba(61,142,240,.18);
  animation:expandRing 5s infinite ease-out;}
@keyframes expandRing{0%{transform:scale(.7);opacity:.4}100%{transform:scale(2.8);opacity:0}}

.app-wrapper{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.3)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glowPulse{0%,100%{opacity:.5;transform:translateX(-50%) scaleX(1)}50%{opacity:.9;transform:translateX(-50%) scaleX(1.2)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ===== SPLASH ===== */
#splash{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;min-height:100vh;animation:fadeIn .6s ease;}
.splash-logo{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;
  color:var(--blue-light);text-transform:uppercase;margin-bottom:14px;
  opacity:0;animation:slideDown .8s .3s ease forwards;}
.splash-title{font-family:'Zen Kaku Gothic New',sans-serif;font-size:42px;font-weight:900;
  line-height:1.05;text-align:center;margin-bottom:6px;
  background:linear-gradient(135deg,#fff 0%,#7bb8f8 50%,#3d8ef0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  opacity:0;animation:slideDown .8s .5s ease forwards;}
.splash-sub{font-size:13px;color:var(--blue-light);opacity:0;letter-spacing:1px;margin-bottom:36px;
  animation:slideDown .8s .7s ease forwards;}
.sonobo-wrap{position:relative;width:200px;height:200px;margin:0 auto 28px;
  opacity:0;animation:popIn .9s .9s cubic-bezier(.34,1.56,.64,1) forwards;}
.sonobo-img{width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 8px 28px rgba(21,101,216,.65));}
.sonobo-float{animation:float 3.2s ease-in-out infinite;}
.sonobo-glow{position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  width:110px;height:18px;
  background:radial-gradient(ellipse,rgba(21,101,216,.55) 0%,transparent 70%);
  border-radius:50%;animation:glowPulse 3.2s ease-in-out infinite;}
.speech-bubble{background:rgba(255,255,255,.08);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.15);border-radius:var(--radius);
  padding:18px 20px;margin:0 4px 28px;position:relative;
  opacity:0;animation:fadeIn .8s 1.5s ease forwards;
  box-shadow:0 4px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);}
.speech-bubble::before{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  border:9px solid transparent;border-bottom-color:rgba(255,255,255,.12);border-top:none;}
.bubble-name{font-size:11px;font-weight:700;color:var(--blue-light);letter-spacing:1px;margin-bottom:6px;}
.bubble-text{font-size:14px;line-height:1.7;color:rgba(255,255,255,.9);min-height:56px;word-break:break-all;overflow-wrap:break-word;min-width:0;}
.cursor-blink{display:inline-block;width:2px;height:14px;background:var(--blue-bright);
  margin-left:2px;animation:blink .8s infinite;vertical-align:middle;}
.btn-start{display:flex;align-items:center;justify-content:center;gap:10px;
  width:calc(100% - 8px);padding:18px 24px;
  background:linear-gradient(135deg,var(--blue-vivid) 0%,#0d4fc0 100%);
  border:none;border-radius:var(--radius);cursor:pointer;
  font-family:'Zen Kaku Gothic New',sans-serif;font-size:17px;font-weight:900;color:white;
  box-shadow:0 6px 28px rgba(21,101,216,.5),inset 0 1px 0 rgba(255,255,255,.2);
  transition:transform .2s ease;opacity:0;animation:fadeIn .8s 2.4s ease forwards;margin:0 4px;}
.btn-start:active{transform:scale(.97);}
.btn-arrow{font-size:22px;}
</style>
</head>
<body>
<div class="bg-canvas" id="bgCanvas"></div>
<div class="app-wrapper">

<!-- ========== SPLASH ========== -->
<div id="splash">
  <p class="splash-logo">SONOFORGE</p>
  <h1 class="splash-title">FAST<br>Journey</h1>
  <p class="splash-sub">ソノボくんと学ぶ・超音波入門</p>
  <div class="sonobo-wrap">
    <div class="sonobo-float">
      <img class="sonobo-img" src="assets/sonobo_1.png" alt="ソノボくん">
    </div>
    <div class="sonobo-glow"></div>
  </div>
  <div class="speech-bubble">
    <p class="bubble-name">🤖 ソノボくん</p>
    <p class="bubble-text" id="typingText"></p>
  </div>
  <button class="btn-start" onclick="location.href='home.html'">
    <span>はじめる</span><span class="btn-arrow">→</span>
  </button>
</div>

</div><!-- /app-wrapper -->

<script>
// ===== 背景 =====
const bg = document.getElementById('bgCanvas');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2.5 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+2}s;--delay:${Math.random()*4}s;--op:${Math.random()*.6+.2};`;
  bg.appendChild(s);
}
for (let i = 0; i < 3; i++) {
  const r = document.createElement('div');
  r.className = 'wave-ring';
  const sz = 60 + i * 50;
  r.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*70+15}%;top:${Math.random()*70+15}%;animation-delay:${i*1.5}s;`;
  bg.appendChild(r);
}

// ===== タイピングアニメ =====
const msgs = [
  'やあ！ぼくはソノボくん🤖\nFASTの世界へようこそ！',
  '一緒にFASTを学ぼう！\n初学者でも大丈夫、ぼくが全部教えるよ！',
  '準備はいい？\nさあ、旅を始めよう🚀'
];
let mi = 0, ci = 0;
const tel = document.getElementById('typingText');
function typeText() {
  const msg = msgs[mi];
  tel.innerHTML = msg.slice(0, ci).replace(/\n/g, '<br>') + '<span class="cursor-blink"></span>';
  ci++;
  if (ci <= msg.length) {
    setTimeout(typeText, 45);
  } else {
    setTimeout(() => { mi = (mi + 1) % msgs.length; ci = 0; setTimeout(typeText, 400); }, 2200);
  }
}
setTimeout(typeText, 1800);
</script>
</body>
</html>
